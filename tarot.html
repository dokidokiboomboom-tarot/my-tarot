// ... (前面的 HTML 內容不變)
    <script>
        /**
         * 重要設定：
         * 1. 預覽環境測試：apiKey 設為空字串，model 設為 gemini-1.5-flash。
         * 2. GitHub 部署：填入 apiKey，model 設為 gemini-1.5-flash。
         */
        
        // 【修正 1】正確抓取環境變數，並確保括號完整
        const apiKey = import.meta.env?.VITE_GEMINI_KEY || ""; 

        if (!apiKey) {
            console.warn("⚠️ 警告：找不到 API 金鑰，請檢查 Vercel 設定");
        }

        const IMAGE_BASE = "https://www.sacred-texts.com/tarot/pkt/img/";
        
        window.state = { tab: 'daily', spread: 1, energy: 3, history: [], selectedCards: [], isDrawing: false };

        const tarotData = (() => {
            const majors = ["愚者","魔術師","女祭司","女皇","皇帝","教皇","戀人","戰車","力量","隱者","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
            const suits = [{n:'權杖', p:'wa'}, {n:'聖杯', p:'cu'}, {n:'寶劍', p:'sw'}, {n:'錢幣', p:'pe'}];
            const ranks = {ac:'王牌','02':'二','03':'三','04':'四','05':'五','06':'六','07':'七','08':'八','09':'九','10':'十',pa:'侍者',kn:'騎士',qu:'皇后',ki:'國王'};
            let deck = [];
            majors.forEach((name, i) => deck.push({ id: `ar${String(i).padStart(2,'0')}`, name: `${name}(${i})` }));
            suits.forEach(s => Object.entries(ranks).forEach(([k, v]) => deck.push({ id: s.p + k, name: `${s.n}${v}` })));
            return deck;
        })();

        const universeMessages = ["妳生命中所發生的一切，都是妳吸引來的。", "感恩是妳能對應宇宙最高頻率的最短路徑。", "當妳感到快樂，妳就正在顯化更多讓妳快樂的事物。"];

        function cleanJSON(text) {
            try {
                const match = text.match(/\{[\s\S]*\}/);
                return JSON.parse(match ? match[0] : text);
            } catch (e) { throw new Error("解析失敗"); }
        }

        async function fetchAI(prompt) {
            // 【修正 2】使用正確的穩定版模型名稱
            const model = "gemini-1.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const systemPrompt = `你是一位專業且溫柔的靈魂占卜師。請針對塔羅牌面進行深度解讀。請嚴格以繁體中文 JSON 回傳結果：{"interpretations":[{"keywords":[],"meaning":"","advice":""}],"summary":"","soulMantra":"","dailyActions":[]}`;
            
            const payload = {
                contents: [{ parts: [{ text: systemPrompt + "\n\n內容：" + prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error(`API Error ${response.status}`);
            const data = await response.json();
            return cleanJSON(data.candidates[0].content.parts[0].text);
        }

        window.updateEnergyUI = function() {
            const dots = document.querySelectorAll('.energy-dot');
            dots.forEach((dot, i) => i < window.state.energy ? dot.classList.remove('empty') : dot.classList.add('empty'));
            if (window.state.energy <= 0) {
                const s = document.getElementById('btn-start-reading'), d = document.getElementById('btn-draw-daily');
                if(s) s.innerText = "能量已滿"; if(d) d.innerText = "能量已滿";
            }
        };

        window.consumeEnergy = function() {
            if (window.state.energy <= 0) { window.openModal('modal-limit'); return false; }
            window.state.energy--; window.updateEnergyUI(); return true;
        };

        window.drawDaily = async function() {
            if (window.state.isDrawing || !window.consumeEnergy()) return;
            window.state.isDrawing = true; document.getElementById('loading').classList.remove('hidden');
            const card = { ...tarotData[Math.floor(Math.random() * tarotData.length)], isRev: Math.random() > 0.5 };
            try {
                const ai = await fetchAI(`每日一抽：${card.name} (${card.isRev?'逆位':'正位'})。`);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('daily-card-front').innerHTML = `<img src="${IMAGE_BASE}${card.id}.jpg" class="card-img ${card.isRev?'reversed':''}">`;
                document.getElementById('daily-card-element').classList.add('flipped');
                setTimeout(() => displayResult("今日靈魂照見", "今日焦點能量", [card], ["核心能量"], ai), 1000);
            } catch(e) { 
                document.getElementById('loading').classList.add('hidden'); window.showToast("連線失敗"); 
                window.state.energy++; window.updateEnergyUI(); 
            } finally { window.state.isDrawing = false; }
        };

        window.startReading = async function() {
            const q = document.getElementById('q-custom').value.trim();
            if(!q) return window.showToast("請描述妳的困惑");
            if (window.state.energy <= 0) return window.openModal('modal-limit');
            window.state.question = q;
            if(window.state.method === 'auto') {
                if (!window.consumeEnergy()) return;
                document.getElementById('loading').classList.remove('hidden');
                const cards = [], shuffled = [...tarotData].sort(() => Math.random() - 0.5);
                for(let i=0; i<window.state.spread; i++) cards.push({ ...shuffled[i], isRev: Math.random() > 0.5 });
                const pos = window.getPositions(window.state.spread);
                try {
                    const ai = await fetchAI(`提問：「${q}」，牌面：${cards.map((c,i)=>`[${pos[i]}] ${c.name}(${c.isRev?'逆位':'正位'})`).join('、')}。`);
                    displayResult("靈魂深度解析", q, cards, pos, ai);
                } catch(e) { document.getElementById('loading').classList.add('hidden'); window.showToast("解析失敗"); window.state.energy++; window.updateEnergyUI(); }
            } else { document.getElementById('reading-setup').classList.add('hidden'); document.getElementById('reading-manual').classList.remove('hidden'); initManualDraw(); }
        };

        function initManualDraw() {
            window.state.selectedCards = [];
            const fan = document.getElementById('deck-fan'), slots = document.getElementById('picked-slots');
            fan.innerHTML = ''; slots.innerHTML = '';
            for(let i=0; i<window.state.spread; i++) slots.innerHTML += `<div class="w-16 h-24 border-2 border-dashed border-white/10 rounded-xl flex items-center justify-center text-[10px] text-gray-600">#${i+1}</div>`;
            const currentDeck = [...tarotData].sort(() => Math.random() - 0.5);
            for(let i=0; i<35; i++) {
                const rotate = -60 + (i * (120 / 34)), item = document.createElement('div');
                item.className = 'fan-item card-face card-back border border-brand/20 shadow-lg';
                item.style.setProperty('--rot', `${rotate}deg`); item.style.setProperty('--idx', i); item.style.transform = `rotate(${rotate}deg)`;
                item.onclick = () => {
                    if (window.state.selectedCards.length >= window.state.spread || item.dataset.picked === "true") return;
                    item.dataset.picked = "true"; item.style.opacity = '0';
                    window.state.selectedCards.push({ ...currentDeck[i], isRev: Math.random() > 0.5 });
                    slots.children[window.state.selectedCards.length-1].innerHTML = `<div class="w-full h-full rounded-xl card-back animate-pulse"></div>`;
                    if (window.state.selectedCards.length === window.state.spread) document.getElementById('btn-manual-reveal').classList.remove('hidden');
                };
                fan.appendChild(item);
            }
        }

        window.revealManual = async function() {
            if (!window.consumeEnergy()) return;
            document.getElementById('loading').classList.remove('hidden');
            const pos = window.getPositions(window.state.spread);
            try {
                const ai = await fetchAI(`提問：「${window.state.question}」，牌面：${window.state.selectedCards.map((c,i)=>`[${pos[i]}] ${c.name}(${c.isRev?'逆位':'正位'})`).join('、')}。`);
                displayResult("個人靈魂透視", window.state.question, window.state.selectedCards, pos, ai);
            } catch(e) { document.getElementById('loading').classList.add('hidden'); window.showToast("失敗"); window.state.energy++; window.updateEnergyUI(); }
        };

        function displayResult(title, q, cards, pos, ai) {
            document.getElementById('loading').classList.add('hidden');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('res-title').innerText = title; document.getElementById('res-q').innerText = q;
            document.getElementById('res-cards').innerHTML = cards.map((c, i) => `
                <div class="text-center w-32 md:w-44 group">
                    <p class="text-[10px] font-black text-brand mb-2 uppercase tracking-widest font-sans">${pos[i]}</p>
                    <div class="relative pt-[175%] rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                        <img src="${IMAGE_BASE}${c.id}.jpg" class="absolute inset-0 w-full h-full card-img ${c.isRev?'reversed':''}">
                    </div>
                    <p class="mt-4 text-sm font-black text-white font-sans">${c.name} ${c.isRev?'(逆位)':'(正位)'}</p>
                </div>
            `).join('');
            document.getElementById('res-content').innerHTML = ai.interpretations.map((item, i) => `
                <div class="glass p-10 rounded-[2.5rem] space-y-8 animate-in slide-in-from-bottom-6">
                    <h3 class="text-3xl serif font-black">【${pos[i]}】 ${cards[i].name}${cards[i].isRev ? ' (逆位)' : ' (正位)'}</h3>
                    <div class="space-y-8 text-lg font-bold font-serif">
                        <div class="border-l-2 border-brand/30 pl-6"><h4 class="text-xs font-black text-brand mb-2 uppercase">能量照見</h4><p class="text-gray-200">${item.meaning}</p></div>
                        <div class="bg-brand/5 p-8 rounded-3xl border border-brand/10 font-sans"><h4 class="text-xs font-black text-brand mb-2 uppercase">深度建議</h4><p class="text-white">${item.advice}</p></div>
                    </div>
                </div>
            `).join('') + `<div class="text-center pt-20"><h3 class="text-4xl serif font-black gold-glow mb-10">能量整合結論</h3><p class="text-gray-300 text-xl font-bold font-serif max-w-2xl mx-auto">${ai.summary}</p><div class="mt-12 inline-block bg-white/5 p-12 rounded-[3.5rem] border border-white/10 italic text-3xl font-black text-brand shadow-2xl">「${ai.soulMantra}」</div></div>`;
            document.getElementById('angel-msg').innerText = universeMessages[Math.floor(Math.random() * universeMessages.length)];
            window.scrollTo({ top: document.getElementById('app').offsetTop, behavior: 'smooth' });
        }

        window.showToast = msg => {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100'); t.classList.replace('translate-y-10', 'translate-y-0');
            setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); t.classList.replace('translate-y-0', 'translate-y-10'); }, 3000);
        };
        window.switchTab = t => {
            window.state.tab = t;
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${t}`).classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            if (t === 'reading') { document.getElementById('reading-setup').classList.remove('hidden'); document.getElementById('reading-manual').classList.add('hidden'); }
        };
        window.openModal = id => {
            if(id === 'modal-universe') document.getElementById('universe-msg-text').innerText = universeMessages[Math.floor(Math.random() * universeMessages.length)];
            document.getElementById(id).classList.replace('hidden', 'flex');
        };
        window.closeModal = id => document.getElementById(id).classList.replace('flex', 'hidden');
        window.backToSetup = () => { document.getElementById('result').classList.add('hidden'); window.switchTab('reading'); };
        window.getPositions = n => n === 1 ? ["核心解方"] : (n === 3 ? ["過去之因", "現在卡點", "未來顯化"] : ["現狀", "阻礙", "潛意識", "基礎", "近期趨勢", "指引"]);
        window.setSpread = (n, b) => { window.state.spread = n; document.querySelectorAll('.spread-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); b.classList.add('bg-brand/10', 'border-brand'); };
        window.setMethod = (m, b) => { window.state.method = m; document.querySelectorAll('.method-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); b.classList.add('bg-brand/10', 'border-brand'); };
        window.setCategory = (c, b) => { document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); b.classList.add('bg-brand/10', 'border-brand'); };

        document.addEventListener('DOMContentLoaded', () => { 
            window.updateEnergyUI(); window.setSpread(1, document.querySelector('.spread-btn'));
            window.setCategory('love', document.querySelector('.cat-btn')); window.setMethod('auto', document.querySelector('.method-btn'));
        });
    </script>
</body>
</html>
