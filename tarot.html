<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心小跳塔羅 | 靈魂解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        :root { --brand: #fb7185; }
        body { background-color: #050206; color: #f3f4f6; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Noto Sans TC', sans-serif; }
        .glass { background: rgba(26, 18, 33, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(251, 113, 133, 0.15); }
        .gold-glow { text-shadow: 0 0 15px rgba(251, 113, 133, 0.6); color: var(--brand); }
        .btn-mystic {
            background: linear-gradient(135deg, #fda4af 0%, #fb7185 100%);
            color: #1a1221; font-weight: 800; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 9999px; box-shadow: 0 4px 20px rgba(251, 113, 133, 0.3);
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-mystic:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 30px rgba(251, 113, 133, 0.5); }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1221 0%, #050206 100%); z-index: -1; }
        .star-layer { position: absolute; inset: -50%; background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.2; animation: starWarp 120s linear infinite; }
        @keyframes starWarp { from { transform: rotate(0deg); } to { transform: rotate(10deg); background-position: -4000px 4000px; } }
        @keyframes heartPulse { 0%, 30%, 100% { transform: scale(1); } 15%, 45% { transform: scale(1.15); } }
        .pulse-heart { animation: heartPulse 2s infinite ease-in-out; color: var(--brand); display: inline-block; }
        .tarot-card-box { perspective: 1500px; width: 100%; max-width: 220px; margin: 0 auto; }
        .tarot-card { width: 100%; padding-top: 175%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .tarot-card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; border: 2px solid rgba(251, 113, 133, 0.3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-back { background: linear-gradient(135deg, #1a1221, #2d1b33); background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .card-front { transform: rotateY(180deg); background: #fff; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .reversed { transform: rotate(180deg); }
        .energy-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 10px var(--brand); }
    </style>
</head>
<body class="antialiased">
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] pointer-events-none">
        <div id="toast" class="opacity-0 translate-y-10 transition-all duration-500 bg-brand text-black font-black px-8 py-4 rounded-full shadow-2xl text-center min-w-[280px]"></div>
    </div>
    <div class="stars-container"><div class="star-layer"></div></div>
    
    <nav class="fixed top-0 w-full z-[60] glass border-b border-white/5 py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <i class="fa-solid fa-heart-pulse pulse-heart text-2xl"></i>
                <span class="serif font-black text-xl gold-glow">心小跳塔羅</span>
            </a>
            <div class="flex items-center gap-4">
                <input type="password" id="api-key-input" placeholder="貼上 API 金鑰" class="bg-white/10 border border-white/20 rounded-full px-4 py-1 text-xs outline-none focus:border-brand transition w-32 md:w-48">
            </div>
        </div>
    </nav>

    <main id="app" class="pt-32 pb-20 px-4 max-w-6xl mx-auto">
        <div class="glass rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="flex border-b border-white/5 bg-black/40 font-black text-sm uppercase">
                <button onclick="switchTab('daily')" class="flex-1 py-6 hover:text-brand transition border-r border-white/5">每日一抽</button>
                <button onclick="switchTab('reading')" class="flex-1 py-6 hover:text-brand transition">深度解惑</button>
            </div>
            
            <div class="p-8 md:p-16 min-h-[600px] relative">
                <!-- 每日一抽 -->
                <div id="panel-daily" class="tab-panel flex flex-col items-center">
                    <h2 class="text-3xl md:text-4xl serif font-black mb-12 text-center">今日能量照見</h2>
                    <div class="tarot-card-box mb-12">
                        <div class="tarot-card" id="daily-card-element" onclick="drawDaily()">
                            <div class="card-face card-back"><i class="fa-solid fa-moon text-brand/20 text-4xl"></i></div>
                            <div class="card-face card-front" id="daily-card-front"></div>
                        </div>
                    </div>
                    <button id="btn-draw-daily" onclick="drawDaily()" class="btn-mystic px-16 py-4">領取靈魂啟示</button>
                </div>

                <!-- 深度問事 -->
                <div id="panel-reading" class="tab-panel hidden">
                    <div class="max-w-xl mx-auto space-y-8">
                        <h2 class="text-3xl md:text-4xl serif font-black text-center mb-8">設定靈魂提問</h2>
                        <textarea id="q-custom" rows="4" placeholder="請閉上眼冥想妳的問題，並在此詳細描述目前的困惑..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-lg outline-none focus:border-brand transition"></textarea>
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="setSpread(1, this)" id="default-spread" class="spread-btn p-4 rounded-xl border border-brand font-bold bg-brand/10">核心(1)</button>
                            <button onclick="setSpread(3, this)" class="spread-btn p-4 rounded-xl border border-white/10 font-bold">演化(3)</button>
                            <button onclick="setSpread(6, this)" class="spread-btn p-4 rounded-xl border border-white/10 font-bold">全景(6)</button>
                        </div>
                        <button onclick="startReading()" class="btn-mystic w-full py-5 text-xl">連結能量場</button>
                    </div>
                </div>

                <!-- 載入中 -->
                <div id="loading" class="hidden absolute inset-0 glass z-50 flex flex-col items-center justify-center rounded-[3rem]">
                    <div class="w-20 h-20 border-4 border-brand border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="text-brand font-black tracking-[0.5em] animate-pulse">正在調頻集體意識...</p>
                </div>

                <!-- 結果顯示 -->
                <div id="result" class="hidden space-y-12 animate-in fade-in duration-700">
                    <button onclick="resetUI()" class="text-xs font-black text-gray-400 hover:text-brand transition"><i class="fa-solid fa-arrow-left"></i> 返回重新占卜</button>
                    <div id="res-cards" class="flex flex-wrap justify-center gap-8"></div>
                    <div id="res-content" class="max-w-3xl mx-auto space-y-8 text-lg"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const IMAGE_BASE = "https://www.sacred-texts.com/tarot/pkt/img/";
        let state = { spread: 1, isDrawing: false };

        const tarotDeck = (() => {
            const majors = ["愚者","魔術師","女祭司","女皇","皇帝","教皇","戀人","戰車","力量","隱者","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
            const suits = [{n:'權杖', p:'wa'}, {n:'聖杯', p:'cu'}, {n:'寶劍', p:'sw'}, {n:'錢幣', p:'pe'}];
            const ranks = {ac:'王牌','02':'二','03':'三','04':'四','05':'五','06':'六','07':'七','08':'八','09':'九','10':'十',pa:'侍者',kn:'騎士',qu:'皇后',ki:'國王'};
            let d = [];
            majors.forEach((n, i) => d.push({ id: `ar${String(i).padStart(2,'0')}`, name: n }));
            suits.forEach(s => Object.entries(ranks).forEach(([k, v]) => d.push({ id: s.p + k, name: s.n + v })));
            return d;
        })();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        async function callAI(prompt) {
            const key = document.getElementById('api-key-input').value.trim() || localStorage.getItem('GEMINI_API_KEY');
            if (!key) throw new Error("請在上方框框內貼上您的 API 金鑰");
            localStorage.setItem('GEMINI_API_KEY', key);

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `你是一位充滿愛與直覺的塔羅導師。請針對以下問題與抽出的牌面提供繁體中文深度解析。請嚴格回傳 JSON 格式：{"interpretations":[{"meaning":"牌面訊息","advice":"療癒建議"}],"soulMantra":"靈魂金句"} \n\n提問與牌陣：${prompt}` }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            if (data.error) throw new Error("金鑰無效或流量過載，請稍後再試");
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${t}`).classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('daily-card-element').classList.remove('flipped');
        }

        function setSpread(n, btn) {
            state.spread = n;
            document.querySelectorAll('.spread-btn').forEach(b => {
                b.classList.remove('border-brand', 'bg-brand/10');
                b.classList.add('border-white/10');
            });
            btn.classList.remove('border-white/10');
            btn.classList.add('border-brand', 'bg-brand/10');
        }

        async function drawDaily() {
            if (state.isDrawing) return;
            state.isDrawing = true;
            document.getElementById('loading').classList.remove('hidden');
            const card = { ...tarotDeck[Math.floor(Math.random() * 78)], isRev: Math.random() > 0.5 };
            
            try {
                const res = await callAI(`每日一抽：${card.name} (${card.isRev?'逆位':'正位'})`);
                document.getElementById('daily-card-front').innerHTML = `<img src="${IMAGE_BASE}${card.id}.jpg" class="card-img ${card.isRev?'reversed':''}">`;
                document.getElementById('daily-card-element').classList.add('flipped');
                setTimeout(() => displayResult([card], ["今日能量"], res), 800);
            } catch (e) { showToast(e.message); }
            finally { document.getElementById('loading').classList.add('hidden'); state.isDrawing = false; }
        }

        async function startReading() {
            const q = document.getElementById('q-custom').value.trim();
            if (!q) return showToast("請寫下妳的提問");
            document.getElementById('loading').classList.remove('hidden');
            
            const cards = [];
            const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
            for(let i=0; i<state.spread; i++) cards.push({ ...shuffled[i], isRev: Math.random() > 0.5 });
            
            const pos = state.spread === 1 ? ["核心能量"] : (state.spread === 3 ? ["過去/潛在","現在/處境","未來/趨勢"] : ["現狀","挑戰","潛意識","根基","發展","指引"]);
            
            try {
                const res = await callAI(`問題：${q}。牌陣：${cards.map((c,i) => pos[i] + ':' + c.name + (c.isRev?'(逆)':'(正)')).join(',')}`);
                displayResult(cards, pos, res);
            } catch (e) { showToast(e.message); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function displayResult(cards, pos, ai) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
            
            document.getElementById('res-cards').innerHTML = cards.map((c, i) => `
                <div class="text-center w-32 md:w-44">
                    <p class="text-brand font-black text-xs mb-2 tracking-widest uppercase">${pos[i]}</p>
                    <img src="${IMAGE_BASE}${c.id}.jpg" class="rounded-xl shadow-2xl ${c.isRev?'reversed':''}">
                    <p class="mt-4 font-bold text-sm">${c.name} ${c.isRev?'(逆位)':'(正位)'}</p>
                </div>
            `).join('');

            document.getElementById('res-content').innerHTML = ai.interpretations.map((item, i) => `
                <div class="glass p-8 rounded-[2rem]">
                    <h3 class="text-xl font-black text-brand mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-sparkles"></i> ${pos[i]} - ${cards[i].name}
                    </h3>
                    <p class="mb-6 text-gray-200 leading-relaxed">${item.meaning}</p>
                    <div class="bg-brand/5 p-5 rounded-2xl border border-brand/20 text-brand font-medium">
                        <i class="fa-solid fa-heart mr-2"></i> 療癒指引：${item.advice}
                    </div>
                </div>
            `).join('') + `<div class="text-center text-2xl md:text-3xl italic font-black text-brand py-10 gold-glow">「${ai.soulMantra}」</div>`;
        }

        function resetUI() {
            document.getElementById('result').classList.add('hidden');
            switchTab('daily');
        }

        document.getElementById('api-key-input').value = localStorage.getItem('GEMINI_API_KEY') || "";
    </script>
</body>
</html>
