<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心小跳塔羅 | 照見靈魂的真實</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        function setupTailwind() {
            if (window.tailwind) {
                tailwind.config = {
                    theme: {
                        extend: {
                            colors: {
                                brand: { light: '#fda4af', DEFAULT: '#fb7185', dark: '#e11d48', deep: '#881337' },
                                mystic: { bg: '#050206', surface: '#1a1221', border: 'rgba(251, 113, 133, 0.2)' }
                            },
                            fontFamily: { serif: ['Noto Serif TC', 'serif'], sans: ['Noto Sans TC', 'sans-serif'] }
                        }
                    }
                };
            } else { setTimeout(setupTailwind, 50); }
        }
        setupTailwind();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        :root { --brand: #fb7185; }
        body { background-color: #050206; color: #f3f4f6; overflow-x: hidden; scroll-behavior: smooth; font-family: 'Noto Sans TC', sans-serif; }
        .glass { background: rgba(26, 18, 33, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(251, 113, 133, 0.15); }
        .gold-glow { text-shadow: 0 0 15px rgba(251, 113, 133, 0.6); color: var(--brand); }
        .btn-mystic {
            background: linear-gradient(135deg, #fda4af 0%, #fb7185 100%);
            color: #1a1221; font-weight: 800; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 9999px; box-shadow: 0 4px 20px rgba(251, 113, 133, 0.3);
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-mystic:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 30px rgba(251, 113, 133, 0.5); }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1221 0%, #050206 100%); z-index: -1; }
        .star-layer { position: absolute; inset: -50%; background-image: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.2; animation: starWarp 120s linear infinite; }
        @keyframes starWarp { from { transform: rotate(0deg); } to { transform: rotate(10deg); background-position: -4000px 4000px; } }
        @keyframes heartPulse { 0%, 30%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(251, 113, 133, 0.4)); } 15%, 45% { transform: scale(1.15); filter: drop-shadow(0 0 25px rgba(251, 113, 133, 0.9)); } }
        .pulse-heart { animation: heartPulse 2s infinite ease-in-out; color: var(--brand); display: inline-block; }
        .tarot-card-box { perspective: 1500px; width: 100%; max-width: 220px; margin: 0 auto; }
        .tarot-card { width: 100%; padding-top: 175%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .tarot-card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; border: 2px solid rgba(251, 113, 133, 0.3); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .card-back { background: linear-gradient(135deg, #1a1221, #2d1b33); background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .card-front { transform: rotateY(180deg); background: #fff; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .reversed { transform: rotate(180deg) !important; }
        .fan-area { position: relative; height: 380px; user-select: none; touch-action: none; overflow: visible; margin-top: 40px; }
        .fan-item { position: absolute; left: calc(50% - 40px); width: 80px; height: 135px; transform-origin: center 480px; cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: var(--idx); }
        .energy-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 10px var(--brand); transition: all 0.5s; }
        .energy-dot.empty { background: #333; box-shadow: none; opacity: 0.5; }
    </style>
</head>
<body class="antialiased">
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] pointer-events-none">
        <div id="toast" class="opacity-0 translate-y-10 transition-all duration-500 bg-brand text-mystic-bg font-black px-8 py-4 rounded-full shadow-2xl text-center min-w-[280px]"></div>
    </div>
    <div class="stars-container"><div class="star-layer"></div></div>
    
    <nav class="fixed top-0 w-full z-[60] glass border-b border-white/5 py-4 px-6 transition-all" id="nav">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <i class="fa-solid fa-heart-pulse pulse-heart text-2xl"></i>
                <span class="serif font-black text-xl gold-glow tracking-tighter">心小跳塔羅</span>
            </div>
            <div class="flex items-center gap-4">
                <div id="energy-container" class="flex gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <div class="energy-dot"></div><div class="energy-dot"></div><div class="energy-dot"></div>
                </div>
            </div>
        </div>
    </nav>

    <header class="min-h-screen flex flex-col items-center justify-center pt-24 px-4 text-center">
        <div class="max-w-4xl space-y-10">
            <i class="fa-solid fa-heart-pulse text-8xl md:text-[10rem] pulse-heart gold-glow"></i>
            <h1 class="text-5xl md:text-8xl serif font-black leading-tight tracking-tighter font-serif">看見潛意識中<br><span class="gold-glow">真正的卡點</span></h1>
            <a href="#app" onclick="window.switchTab('reading')" class="btn-mystic px-20 py-5 text-xl font-black tracking-widest shadow-lg">開啟靈魂解析</a>
        </div>
    </header>

    <main id="app" class="py-20 px-4 max-w-6xl mx-auto scroll-mt-24">
        <div class="glass rounded-[3rem] overflow-hidden shadow-2xl border border-white/10">
            <div class="flex border-b border-white/5 bg-black/40 font-black text-xs md:text-sm tracking-widest uppercase">
                <button onclick="window.switchTab('daily')" class="flex-1 py-6 transition-all border-r border-white/5">每日一抽</button>
                <button onclick="window.switchTab('reading')" class="flex-1 py-6 transition-all">深度解惑</button>
            </div>
            
            <div class="p-8 md:p-16 min-h-[650px] relative">
                <!-- 每日一抽 -->
                <div id="panel-daily" class="tab-panel flex flex-col items-center text-center animate-in fade-in duration-500">
                    <h2 class="text-4xl serif font-black mb-12">今日能量照見</h2>
                    <div class="tarot-card-box mb-12">
                        <div class="tarot-card" id="daily-card-element" onclick="window.drawDaily()">
                            <div class="card-face card-back"><i class="fa-solid fa-moon-stars text-brand/20 text-4xl"></i></div>
                            <div class="card-face card-front" id="daily-card-front"></div>
                        </div>
                    </div>
                    <button id="btn-draw-daily" onclick="window.drawDaily()" class="btn-mystic px-16 py-4 font-black">領取靈魂啟示</button>
                </div>

                <!-- 深度問事 -->
                <div id="panel-reading" class="tab-panel hidden animate-in fade-in duration-500">
                    <div id="reading-setup" class="max-w-4xl mx-auto space-y-12">
                        <div class="text-center"><h2 class="text-4xl serif font-black mb-4">設定靈魂提問</h2></div>
                        <div class="grid md:grid-cols-2 gap-12">
                            <div class="space-y-8">
                                <div><label class="block text-[10px] font-black text-brand mb-4 tracking-[0.3em] uppercase">STEP 1. 能量領域</label>
                                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        <button class="cat-btn px-2 py-4 rounded-2xl border border-white/10 text-xs font-bold transition" onclick="window.setCategory('love', this)">親密關係</button>
                                        <button class="cat-btn px-2 py-4 rounded-2xl border border-white/10 text-xs font-bold transition" onclick="window.setCategory('career', this)">事業顯化</button>
                                        <button class="cat-btn px-2 py-4 rounded-2xl border border-white/10 text-xs font-bold transition" onclick="window.setCategory('wealth', this)">金錢豐盛</button>
                                        <button class="cat-btn px-2 py-4 rounded-2xl border border-white/10 text-xs font-bold transition" onclick="window.setCategory('health', this)">身心療癒</button>
                                        <button class="cat-btn px-2 py-4 rounded-2xl border border-white/10 text-xs font-bold transition" onclick="window.setCategory('spiritual', this)">靈魂指引</button>
                                    </div>
                                </div>
                                <div><label class="block text-[10px] font-black text-brand mb-4 tracking-[0.3em] uppercase">STEP 2. 提問內容</label>
                                    <select id="q-suggest" class="w-full bg-mystic-surface border border-white/10 rounded-2xl p-4 text-xs mb-3 outline-none font-bold" onchange="document.getElementById('q-custom').value=this.value"></select>
                                    <textarea id="q-custom" rows="3" placeholder="請詳細描述目前的狀況..." class="w-full bg-mystic-surface border border-white/10 rounded-2xl p-4 text-sm outline-none transition font-bold resize-none"></textarea>
                                </div>
                            </div>
                            <div class="space-y-8">
                                <div><label class="block text-[10px] font-black text-brand mb-4 tracking-[0.3em] uppercase">STEP 3. 牌陣選擇</label>
                                    <div class="grid grid-cols-3 gap-3">
                                        <button class="spread-btn px-3 py-5 rounded-2xl border border-white/10 text-xs font-black transition" onclick="window.setSpread(1, this)">核心(1)</button>
                                        <button class="spread-btn px-3 py-5 rounded-2xl border border-white/10 text-xs font-black transition" onclick="window.setSpread(3, this)">演化(3)</button>
                                        <button class="spread-btn px-3 py-5 rounded-2xl border border-white/10 text-xs font-black transition" onclick="window.setSpread(6, this)">全景(6)</button>
                                    </div>
                                </div>
                                <div><label class="block text-[10px] font-black text-brand mb-4 tracking-[0.3em] uppercase">STEP 4. 連結方式</label>
                                    <div class="flex gap-3"><button class="method-btn flex-1 py-5 rounded-2xl border border-white/10 text-xs font-black transition" onclick="window.setMethod('auto', this)">直覺洗牌</button><button class="method-btn flex-1 py-5 rounded-2xl border border-white/10 text-xs font-black transition" onclick="window.setMethod('manual', this)">親自選牌</button></div>
                                </div>
                            </div>
                        </div>
                        <div class="pt-8 text-center"><button id="btn-start-reading" onclick="window.startReading()" class="btn-mystic px-20 py-5 text-xl font-black">連結能量場</button></div>
                    </div>
                    
                    <div id="reading-manual" class="hidden flex flex-col items-center">
                        <div id="deck-fan" class="fan-area w-full max-w-5xl"></div>
                        <div class="w-full mt-8 bg-white/5 border border-white/10 rounded-[2rem] p-8 text-center">
                            <div class="flex flex-wrap justify-center gap-4 min-h-[140px]" id="picked-slots"></div>
                        </div>
                        <button id="btn-manual-reveal" class="btn-mystic px-16 py-5 mt-10 hidden font-black" onclick="window.revealManual()">揭曉神諭</button>
                    </div>
                </div>

                <div id="loading" class="hidden absolute inset-0 glass z-50 flex flex-col items-center justify-center text-center p-6 rounded-[3rem]">
                    <div class="w-20 h-20 border-4 border-brand border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="text-brand font-black animate-pulse uppercase tracking-widest">正在調頻集體意識...</p>
                </div>

                <div id="result" class="hidden space-y-12 pb-10">
                    <button onclick="window.switchTab('reading')" class="text-xs font-black text-gray-400 hover:text-brand transition flex items-center gap-2 bg-white/5 px-6 py-3 rounded-full font-sans">重新提問</button>
                    <div class="text-center space-y-6">
                        <h2 class="text-5xl md:text-7xl serif font-black gold-glow" id="res-title"></h2>
                        <p id="res-q" class="text-gray-400 italic text-xl font-bold border-l-4 border-brand/30 pl-4 inline-block font-serif"></p>
                    </div>
                    <div class="flex flex-wrap justify-center gap-10 py-10" id="res-cards"></div>
                    <div id="res-content" class="max-w-4xl mx-auto space-y-12"></div>
                    
                    <div class="max-w-4xl mx-auto mt-12 space-y-8">
                        <h4 class="text-brand text-[10px] font-black tracking-[0.5em] uppercase text-center">推薦落實的靈魂行動</h4>
                        <div id="daily-actions-list" class="grid md:grid-cols-3 gap-6"></div>
                    </div>

                    <div class="bg-gradient-to-br from-brand/20 to-mystic-surface p-12 md:p-16 rounded-[3.5rem] border border-brand/30 text-center shadow-3xl">
                        <p class="text-2xl font-bold font-serif text-white leading-relaxed mb-12 italic" id="angel-msg"></p>
                        <a href="https://www.instagram.com/dokidokiboomboom.tarot/" target="_blank" class="btn-mystic px-16 py-5 inline-block font-black tracking-widest text-lg">預約 1:1 占卜</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const IMAGE_BASE = "https://www.sacred-texts.com/tarot/pkt/img/";
        window.state = { tab: 'daily', spread: 1, energy: 3, history: [], method: 'auto', selectedCards: [], isDrawing: false };

        const tarotData = (() => {
            const majors = ["愚者","魔術師","女祭司","女皇","皇帝","教皇","戀人","戰車","力量","隱者","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
            const suits = [{n:'權杖', p:'wa'}, {n:'聖杯', p:'cu'}, {n:'寶劍', p:'sw'}, {n:'錢幣', p:'pe'}];
            const ranks = {ac:'王牌','02':'二','03':'三','04':'四','05':'五','06':'六','07':'七','08':'八','09':'九','10':'十',pa:'侍者',kn:'騎士',qu:'皇后',ki:'國王'};
            let deck = [];
            majors.forEach((name, i) => deck.push({ id: `ar${String(i).padStart(2,'0')}`, name: name }));
            suits.forEach(s => Object.entries(ranks).forEach(([k, v]) => deck.push({ id: s.p + k, name: s.n + v })));
            return deck;
        })();

        const categoryData = {
            love: ["未來三個月，我該如何吸引適合的伴侶？", "這段關係目前的卡點在哪？"],
            career: ["未來三個月，職場發展潛力為何？", "目前工作的阻礙源自於哪？"],
            wealth: ["我目前的財富能量狀態？", "如何顯化更多的豐盛？"],
            health: ["目前最需要關注的健康能量點？", "如何修復最近的疲累感？"],
            spiritual: ["此階段靈魂需要學習的課題？", "宇宙目前想透過潛意識告訴我什麼？"]
        };

        function cleanJSON(text) {
            try {
                const match = text.match(/\{[\s\S]*\}/);
                return JSON.parse(match ? match[0] : text);
            } catch (e) { throw new Error("解碼失敗"); }
        }

        async function fetchAI(prompt) {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            if (!response.ok) throw new Error("能量中斷");
            const data = await response.json();
            return cleanJSON(data.candidates[0].content.parts[0].text);
        }

        window.updateEnergyUI = () => {
            const dots = document.querySelectorAll('.energy-dot');
            dots.forEach((dot, i) => i < window.state.energy ? dot.classList.remove('empty') : dot.classList.add('empty'));
        };

        window.drawDaily = async () => {
            if (window.state.isDrawing || window.state.energy <= 0) return;
            window.state.isDrawing = true;
            document.getElementById('loading').classList.remove('hidden');
            const card = { ...tarotData[Math.floor(Math.random() * 78)], isRev: Math.random() > 0.5 };
            try {
                const ai = await fetchAI(`每日一抽：${card.name} (${card.isRev?'逆位':'正位'})`);
                window.state.energy--; window.updateEnergyUI();
                document.getElementById('daily-card-front').innerHTML = `<img src="${IMAGE_BASE}${card.id}.jpg" class="card-img ${card.isRev?'reversed':''}">`;
                document.getElementById('daily-card-element').classList.add('flipped');
                setTimeout(() => displayResult("今日靈魂照見", "每日焦點", [card], ["核心能量"], ai), 1000);
            } catch(e) { window.showToast("連線失敗"); }
            finally { document.getElementById('loading').classList.add('hidden'); window.state.isDrawing = false; }
        };

        window.startReading = async () => {
            const q = document.getElementById('q-custom').value.trim();
            if(!q) return window.showToast("請描述困惑");
            if (window.state.energy <= 0) return window.showToast("能量已耗盡");
            window.state.question = q;
            if(window.state.method === 'auto') {
                document.getElementById('loading').classList.remove('hidden');
                const cards = [], shuffled = [...tarotData].sort(() => Math.random() - 0.5);
                for(let i=0; i<window.state.spread; i++) cards.push({ ...shuffled[i], isRev: Math.random() > 0.5 });
                const pos = window.getPositions(window.state.spread);
                try {
                    const ai = await fetchAI(`問題：${q}。牌面：${cards.map((c,i)=>`[${pos[i]}] ${c.name}(${c.isRev?'逆':'正'})`).join('、')}`);
                    window.state.energy--; window.updateEnergyUI();
                    displayResult("靈魂深度解析", q, cards, pos, ai);
                } catch(e) { window.showToast("解析失敗"); }
                finally { document.getElementById('loading').classList.add('hidden'); }
            } else { 
                document.getElementById('reading-setup').classList.add('hidden'); 
                document.getElementById('reading-manual').classList.remove('hidden'); 
                initManualDraw(); 
            }
        };

        function initManualDraw() {
            window.state.selectedCards = [];
            const fan = document.getElementById('deck-fan'), slots = document.getElementById('picked-slots');
            fan.innerHTML = ''; slots.innerHTML = '';
            for(let i=0; i<window.state.spread; i++) slots.innerHTML += `<div class="w-16 h-24 border-2 border-dashed border-white/10 rounded-xl"></div>`;
            for(let i=0; i<30; i++) {
                const rot = -60 + (i * 4), item = document.createElement('div');
                item.className = 'fan-item card-face card-back border border-brand/20 shadow-lg';
                item.style.setProperty('--rot', `${rot}deg`); item.style.transform = `rotate(${rot}deg)`;
                item.onclick = () => {
                    if (window.state.selectedCards.length >= window.state.spread || item.style.opacity === '0') return;
                    item.style.opacity = '0';
                    window.state.selectedCards.push({ ...tarotData[Math.floor(Math.random()*78)], isRev: Math.random() > 0.5 });
                    slots.children[window.state.selectedCards.length-1].classList.add('bg-brand/20');
                    if (window.state.selectedCards.length === window.state.spread) document.getElementById('btn-manual-reveal').classList.remove('hidden');
                };
                fan.appendChild(item);
            }
        }

        window.revealManual = async () => {
            document.getElementById('loading').classList.remove('hidden');
            const pos = window.getPositions(window.state.spread);
            try {
                const ai = await fetchAI(`問題：${window.state.question}。牌面：${window.state.selectedCards.map((c,i)=>`[${pos[i]}] ${c.name}(${c.isRev?'逆':'正'})`).join('、')}`);
                window.state.energy--; window.updateEnergyUI();
                displayResult("個人靈魂透視", window.state.question, window.state.selectedCards, pos, ai);
            } catch(e) { window.showToast("揭曉失敗"); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        };

        function displayResult(title, q, cards, pos, ai) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('res-title').innerText = title; document.getElementById('res-q').innerText = q;
            document.getElementById('res-cards').innerHTML = cards.map((c, i) => `
                <div class="text-center w-32 md:w-44">
                    <p class="text-[10px] font-black text-brand mb-2">${pos[i]}</p>
                    <img src="${IMAGE_BASE}${c.id}.jpg" class="rounded-2xl ${c.isRev?'reversed':''}">
                    <p class="mt-4 text-sm font-bold">${c.name}</p>
                </div>
            `).join('');
            document.getElementById('res-content').innerHTML = ai.interpretations.map((item, i) => `
                <div class="glass p-10 rounded-[2.5rem] mb-6">
                    <h3 class="text-2xl font-black mb-4">【${pos[i]}】 ${cards[i].name}</h3>
                    <p class="text-gray-200 mb-4">${item.meaning}</p>
                    <div class="bg-brand/5 p-6 rounded-2xl border border-brand/10 text-brand">✨ 建議：${item.advice}</div>
                </div>
            `).join('') + `<div class="text-center py-10 italic text-3xl font-black text-brand">「${ai.soulMantra}」</div>`;
            
            document.getElementById('daily-actions-list').innerHTML = (ai.dailyActions || ["寫下感恩事項", "深呼吸三分鐘"]).map((a,idx) => `
                <div class="glass p-8 rounded-3xl border-white/5 text-center transition hover:border-brand/30">
                    <span class="text-brand font-black text-4xl opacity-20 italic">0${idx+1}</span>
                    <p class="text-white font-bold mt-4 font-serif">${a}</p>
                </div>
            `).join('');
            window.scrollTo({ top: document.getElementById('app').offsetTop - 100, behavior: 'smooth' });
        }

        window.showToast = msg => {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        };
        window.switchTab = t => {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(`panel-${t}`).classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            if(t === 'reading') { document.getElementById('reading-setup').classList.remove('hidden'); document.getElementById('reading-manual').classList.add('hidden'); }
        };
        window.getPositions = n => n === 1 ? ["核心"] : (n === 3 ? ["過去", "現在", "未來"] : ["現狀", "阻礙", "潛意識", "基礎", "趨勢", "指引"]);
        window.setSpread = (n, b) => { window.state.spread = n; document.querySelectorAll('.spread-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); b.classList.add('bg-brand/10', 'border-brand'); };
        window.setMethod = (m, b) => { window.state.method = m; document.querySelectorAll('.method-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); b.classList.add('bg-brand/10', 'border-brand'); };
        window.setCategory = (c, b) => { 
            document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('bg-brand/10', 'border-brand')); 
            b.classList.add('bg-brand/10', 'border-brand');
            document.getElementById('q-suggest').innerHTML = '<option value="">提問參考</option>' + categoryData[c].map(x => `<option value="${x}">${x}</option>`).join('');
        };
        document.addEventListener('DOMContentLoaded', () => { 
            window.updateEnergyUI(); 
            window.setSpread(1, document.querySelector('.spread-btn'));
            window.setMethod('auto', document.querySelector('.method-btn'));
        });
    </script>
</body>
</html>
