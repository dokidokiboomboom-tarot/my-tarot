<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心小跳線上塔羅占卜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0508; /* 極深紫色背景 */
            font-family: 'Noto Serif TC', serif;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 夢幻星靈背景 */
        .aura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 133, 162, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        /* 飄浮粒子 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.4;
            z-index: -1;
        }

        /* 呼吸光球 */
        .core-orb {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 183, 197, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            animation: breathe 4s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        /* 懸浮塔羅牌剪影 */
        .floating-card {
            position: absolute;
            width: 80px;
            height: 130px;
            border: 1px solid rgba(255, 183, 197, 0.3);
            border-radius: 8px;
            background: rgba(255, 183, 197, 0.05);
            backdrop-filter: blur(2px);
            animation: float 6s infinite ease-in-out;
            z-index: 0;
        }

        .card-1 { top: 15%; left: 10%; animation-delay: 0s; }
        .card-2 { top: 60%; left: 15%; animation-delay: 2s; }
        .card-3 { top: 20%; right: 12%; animation-delay: 4s; }
        .card-4 { top: 70%; right: 18%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        /* 主要內容區域 */
        .hero-content {
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2.5s ease-out 1s forwards;
            padding: 0 20px;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 優化標題呈現方式 */
        .brand-container {
            margin-bottom: 2rem;
        }

        .title-main {
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.15em;
            text-shadow: 0 0 20px rgba(255, 133, 162, 0.8), 0 0 40px rgba(255, 133, 162, 0.4);
            line-height: 1.1;
        }

        .title-sub-brand {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 400;
            color: #ffb7c5;
            letter-spacing: 0.6em;
            margin-top: 0.5rem;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255, 133, 162, 0.5);
            text-indent: 0.6em; /* 修正間距視覺居中 */
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 183, 197, 0.7);
            letter-spacing: 0.3em;
            margin-top: 1.5rem;
            margin-bottom: 3.5rem;
        }

        /* 互動按鈕 */
        .btn-divine {
            position: relative;
            display: inline-block;
            padding: 1rem 3.5rem;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            border: 1px solid rgba(255, 183, 197, 0.5);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.5s;
            background: rgba(255, 133, 162, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn-divine::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.6s;
        }

        .btn-divine:hover {
            background: rgba(255, 133, 162, 0.4);
            border-color: #ff85a2;
            box-shadow: 0 0 40px rgba(255, 133, 162, 0.6);
            letter-spacing: 0.4em;
            transform: scale(1.05);
        }

        .btn-divine:hover::before {
            left: 100%;
        }

        /* 裝飾線條 */
        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffb7c5, transparent);
            margin: 1.5rem auto;
        }

    </style>
</head>
<body>

    <div class="aura-bg"></div>
    <div class="particles"></div>
    
    <!-- 懸浮裝飾元素 -->
    <div class="floating-card card-1"></div>
    <div class="floating-card card-2"></div>
    <div class="floating-card card-3"></div>
    <div class="floating-card card-4"></div>
    
    <!-- 核心光感 -->
    <div class="core-orb"></div>

    <div class="hero-content">
        <p class="text-pink-200 mb-4 opacity-50 tracking-[0.4em] text-xs uppercase">Your Inner Voice Guide</p>
        
        <div class="brand-container">
            <h1 class="title-main">心小跳</h1>
            <p class="title-sub-brand">線上塔羅占卜</p>
        </div>

        <div class="divider"></div>
        
        <p class="subtitle">聽見靈魂深處的微弱跳動</p>
        
        <div class="mt-8">
            <a href="tarot.html" class="btn-divine">
                開啟命運之門
            </a>
        </div>
        
        <p class="mt-12 text-pink-300/30 text-[10px] tracking-[0.2em]">TOUCH TO START YOUR SPIRITUAL JOURNEY</p>
    </div>

</body>
</html>
